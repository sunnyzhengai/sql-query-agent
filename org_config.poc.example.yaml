# POC config — rename to org_config.yaml and upload to your Lakehouse Files/sql-query-agent/
org:
  name: "POC Workspace"

lakehouse:
  # Data dictionary (run load_clarity_dictionary notebook first to create these)
  dict_tables: "dict_tables"
  dict_columns: "dict_columns"

  # SQL sources (your extracted stored procedures)
  sql_sources: "sql_sources"

  # Graph output tables (written by the orchestrator)
  graph_nodes: "graph_nodes"
  graph_edges: "graph_edges"

# Column mapping (matches the output of load_clarity_dictionary)
dictionary:
  table_name_col: "TABLE_NAME"
  column_name_col: "COLUMN_NAME"
  description_col: "DESCRIPTION"

metrics:
  catalog_path: "metric_catalog"

# Catalog adapters — fill in your Collibra credentials below
adapters:
  collibra:
    base_url: "REPLACE_WITH_YOUR_COLLIBRA_DEV_URL/rest/2.0"
    username: "REPLACE_WITH_YOUR_USERNAME"
    password: "REPLACE_WITH_YOUR_PASSWORD"
    domain_id: "REPLACE_WITH_CLINICAL_GLOSSARY_DOMAIN_ID"
    asset_type_id: "REPLACE_WITH_BUSINESS_TERM_TYPE_ID"
