# POC config — rename to org_config.yaml and upload to your Lakehouse Files/sql-query-agent/
org:
  name: "POC Workspace"

lakehouse:
  # Data dictionary — update paths to your ABFS location or managed table names
  # For CSV files in another workspace, use the full ABFS path:
  #   abfss://BI-POC@onelake.dfs.fabric.microsoft.com/SZ_SQL_Logic.Lakehouse/Files/data/dictionaries/CLARITY_TBL.csv
  dict_tables: "REPLACE_WITH_PATH_TO_CLARITY_TBL"
  dict_columns: "REPLACE_WITH_PATH_TO_CLARITY_COL"

  # SQL sources (your extracted stored procedures)
  sql_sources: "sql_sources"

  # Graph output tables (written by the orchestrator)
  graph_nodes: "graph_nodes"
  graph_edges: "graph_edges"

# Clarity data dictionary column mapping
dictionary:
  table_name_col: "TABLE_NAME"
  table_id_col: "TABLE_ID"                   # dict_columns uses TABLE_ID, not TABLE_NAME — joined automatically
  table_description_col: "TABLE_INTRODUCTION" # description column in CLARITY_TBL
  column_name_col: "COLUMN_NAME"
  description_col: "DESCRIPTION"              # description column in CLARITY_COL

metrics:
  catalog_path: "metric_catalog"

# Catalog adapters — fill in your Collibra credentials below
adapters:
  collibra:
    base_url: "REPLACE_WITH_YOUR_COLLIBRA_DEV_URL/rest/2.0"
    username: "REPLACE_WITH_YOUR_USERNAME"
    password: "REPLACE_WITH_YOUR_PASSWORD"
    domain_id: "REPLACE_WITH_CLINICAL_GLOSSARY_DOMAIN_ID"
    asset_type_id: "REPLACE_WITH_BUSINESS_TERM_TYPE_ID"
